spring.application.name=deploy

spring.datasource.url= ${DB_URL: jdbc:postgresql://pg-deploy1-akuhalo65-b9b8.g.aivencloud.com:23024/defaultdb?sslmode=require}
spring.datasource.username= ${DB_USER:avnadmin}
spring.datasource.password= ${DB_PASSWORD:AVNS_xUL_wvDTPzlDZtWNS9h}
spring.datasource.driver-class-name=org.postgresql.Driver

# hikari connection pool
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initializationFailTimeout=60000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
sprint.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.zaxxer.hikari=DEBUG

# graceful shutdown

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

server.port=9090